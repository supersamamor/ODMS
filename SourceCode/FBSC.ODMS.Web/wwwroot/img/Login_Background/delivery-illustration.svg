<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-labelledby="deliveryIllustrationTitle">
    <title id="deliveryIllustrationTitle">Illustration of a delivery truck on a route with a reporting dashboard card, representing the One Delivery Management System</title>
    <defs>
        <linearGradient id="skyGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#eef4fb" />
            <stop offset="100%" stop-color="#dbe7f5" />
        </linearGradient>
    </defs>

    <!-- backdrop -->
    <circle cx="300" cy="290" r="250" fill="url(#skyGradient)" />

    <!-- ground -->
    <rect x="40" y="440" width="520" height="16" rx="8" fill="#c7d4e3" />

    <!-- dashed route line -->
    <path d="M100 440 C 180 340, 260 340, 300 400 S 420 300, 500 260" fill="none" stroke="#9fb3cc" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 18" />

    <!-- route pin at destination -->
    <g transform="translate(500 190)">
        <path d="M0 0 C -28 0 -50 22 -50 50 C -50 88 0 130 0 130 C 0 130 50 88 50 50 C 50 22 28 0 0 0 Z" fill="#1e3a8a" />
        <circle cx="0" cy="50" r="20" fill="#ffffff" />
        <path d="M-9 50 L-2 58 L12 40" fill="none" stroke="#1e3a8a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- delivery truck -->
    <g transform="translate(60 300)">
        <!-- cargo box -->
        <rect x="0" y="20" width="190" height="110" rx="10" fill="#2c4a7c" />
        <rect x="16" y="38" width="158" height="60" rx="6" fill="#3f5f97" />
        <!-- cab -->
        <path d="M190 70 h56 a14 14 0 0 1 14 14 v46 h-70 Z" fill="#1e3a8a" />
        <rect x="204" y="84" width="34" height="26" rx="4" fill="#cfe0f5" />
        <!-- bumper -->
        <rect x="0" y="128" width="260" height="10" rx="5" fill="#16294d" />
        <!-- wheels -->
        <circle cx="52" cy="150" r="26" fill="#22314a" />
        <circle cx="52" cy="150" r="10" fill="#c7d4e3" />
        <circle cx="212" cy="150" r="26" fill="#22314a" />
        <circle cx="212" cy="150" r="10" fill="#c7d4e3" />
    </g>

    <!-- motion lines -->
    <g stroke="#9fb3cc" stroke-width="6" stroke-linecap="round">
        <line x1="18" y1="360" x2="46" y2="360" />
        <line x1="10" y1="382" x2="38" y2="382" />
        <line x1="24" y1="404" x2="52" y2="404" />
    </g>

    <!-- reporting / dashboard card -->
    <g transform="translate(330 90)">
        <rect x="0" y="0" width="176" height="132" rx="16" fill="#ffffff" stroke="#d7e1ee" stroke-width="2" />
        <circle cx="26" cy="28" r="8" fill="#1cc88a" />
        <rect x="44" y="22" width="94" height="12" rx="6" fill="#c7d4e3" />
        <rect x="24" y="56" width="26" height="52" rx="4" fill="#9fb3cc" />
        <rect x="60" y="72" width="26" height="36" rx="4" fill="#3f5f97" />
        <rect x="96" y="46" width="26" height="62" rx="4" fill="#1e3a8a" />
        <rect x="132" y="64" width="26" height="44" rx="4" fill="#9fb3cc" />
    </g>
</svg>
