<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" role="img" aria-labelledby="deliveryIllustrationTitle">
    <title id="deliveryIllustrationTitle">Illustration of an analytics dashboard with a report launching upward, representing enterprise software delivery and reporting</title>
    <defs>
        <linearGradient id="skyGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#eef4fb" />
            <stop offset="100%" stop-color="#dbe7f5" />
        </linearGradient>
    </defs>

    <!-- backdrop -->
    <circle cx="300" cy="290" r="250" fill="url(#skyGradient)" />

    <!-- desk / ground shadow -->
    <ellipse cx="250" cy="470" rx="190" ry="16" fill="#c7d4e3" />

    <!-- monitor stand -->
    <rect x="228" y="410" width="44" height="34" rx="6" fill="#9fb3cc" />
    <rect x="180" y="440" width="140" height="14" rx="7" fill="#9fb3cc" />

    <!-- monitor -->
    <rect x="90" y="140" width="320" height="270" rx="18" fill="#1e3a8a" />
    <rect x="112" y="162" width="276" height="226" rx="8" fill="#ffffff" />

    <!-- dashboard header row -->
    <circle cx="132" cy="182" r="6" fill="#1cc88a" />
    <rect x="148" y="177" width="120" height="10" rx="5" fill="#c7d4e3" />
    <rect x="330" y="174" width="36" height="16" rx="8" fill="#eef4fb" />

    <!-- bar chart -->
    <rect x="132" y="300" width="26" height="60" rx="4" fill="#9fb3cc" />
    <rect x="168" y="272" width="26" height="88" rx="4" fill="#3f5f97" />
    <rect x="204" y="248" width="26" height="112" rx="4" fill="#1e3a8a" />
    <rect x="240" y="286" width="26" height="74" rx="4" fill="#9fb3cc" />

    <!-- trend line over the bars -->
    <path d="M132 296 L181 262 L230 236 L279 292 L340 214" fill="none" stroke="#1cc88a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="340" cy="214" r="7" fill="#1cc88a" />

    <!-- success badge on screen -->
    <circle cx="352" cy="330" r="26" fill="#eaf8f2" />
    <path d="M341 330 L349 338 L364 320" fill="none" stroke="#1cc88a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

    <!-- floating KPI card -->
    <g transform="translate(56 96)">
        <rect x="0" y="0" width="132" height="92" rx="14" fill="#ffffff" stroke="#d7e1ee" stroke-width="2" />
        <rect x="18" y="18" width="70" height="10" rx="5" fill="#c7d4e3" />
        <circle cx="100" cy="46" r="24" fill="none" stroke="#eef1f6" stroke-width="10" />
        <circle cx="100" cy="46" r="24" fill="none" stroke="#1e3a8a" stroke-width="10" stroke-dasharray="113" stroke-dashoffset="34" stroke-linecap="round" transform="rotate(-90 100 46)" />
        <rect x="18" y="60" width="46" height="9" rx="4.5" fill="#eef1f6" />
    </g>

    <!-- release rocket ascending -->
    <g transform="translate(452 128) rotate(18)">
        <path d="M0 0 C 10 12 14 30 14 48 L14 58 Q14 66 6 69 L-6 69 Q-14 66 -14 58 L-14 48 C-14 30 -10 12 0 0 Z" fill="#1e3a8a" />
        <circle cx="0" cy="30" r="7" fill="#ffffff" />
        <path d="M-14 50 L-30 68 L-14 62 Z" fill="#3f5f97" />
        <path d="M14 50 L30 68 L14 62 Z" fill="#3f5f97" />
        <path d="M-6 69 Q0 86 0 92 Q0 86 6 69 Z" fill="#f6c23e" />
    </g>

    <!-- motion trail behind rocket -->
    <path d="M470 360 C 460 320 470 270 500 220" fill="none" stroke="#9fb3cc" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 16" />

    <!-- sparkle accents -->
    <g fill="#9fb3cc">
        <circle cx="410" cy="150" r="5" />
        <circle cx="440" cy="196" r="4" />
        <circle cx="386" cy="110" r="3.5" />
    </g>
</svg>
